<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>⚡ 我的电气工程错题本</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --primary-color: #42b983;
      --primary-hover: #359469;
      --bg-color: #f7fafc;
      --card-bg: #ffffff;
      --text-main: #2d3748;
      --text-muted: #718096;
      --border-color: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* 侧边栏 */
    .sidebar {
      width: 260px;
      background-color: #1a202c;
      color: #fff;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 18px;
      font-weight: bold;
      padding: 10px 24px 20px;
      border-bottom: 1px solid #2d3748;
      color: var(--primary-color);
    }
    .menu-list { list-style: none; margin-top: 15px; }
    .menu-item {
      padding: 14px 24px;
      cursor: pointer;
      font-size: 14px;
      color: #cbd5e0;
      transition: all 0.2s;
      border-left: 4px solid transparent;
    }
    .menu-item:hover, .menu-item.active {
      background-color: #2d3748;
      color: #fff;
    }
    .menu-item.active {
      border-left-color: var(--primary-color);
      font-weight: bold;
    }

    /* 主体 */
    .main-content {
      flex-grow: 1;
      padding: 40px;
      overflow-y: auto;
      display: flex;
      justify-content: center;
    }
    .quiz-container {
      width: 100%;
      max-width: 800px;
    }
    /* 进度条 */
    .progress-wrapper { margin-bottom: 25px; }
    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background-color: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background-color: var(--primary-color);
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 13px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 6px;
      font-weight: bold;
    }
    /* 卡片 */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }
    .tag {
      background-color: #ebf8ff;
      color: #2b6cb0;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .tag.multi {
      background-color: #fff5f5;
      color: #c53030;
    }
    .title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
    img {
      max-width: 100%;
      height: auto;
      margin: 20px auto;
      display: block;
      border: 1px solid #edf2f7;
      border-radius: 8px;
    }
    /* 选项 */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin: 25px 0;
    }
    .option-btn {
      background-color: #f7fafc;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 16px 0;
      font-size: 20px;
      font-weight: 800;
      color: #4a5568;
      cursor: pointer;
      transition: all 0.15s;
    }
    .option-btn:hover {
      background-color: #edf2f7;
      border-color: #cbd5e0;
    }
    .option-btn.selected {
      background-color: #e3f2fd !important;
      border-color: #2196f3 !important;
      color: #0d47a1 !important;
    }
    .option-btn.correct {
      background-color: #f0fff4 !important;
      border-color: #38a169 !important;
      color: #276749 !important;
    }
    .option-btn.wrong {
      background-color: #fff5f5 !important;
      border-color: #e53e3e !important;
      color: #9b2c2c !important;
    }
    .footer-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
    }
    .feedback { font-weight: bold; font-size: 16px; min-height: 24px; text-align: center; }
    .feedback.correct { color: #38a169; }
    .feedback.wrong { color: #e53e3e; }
    
    .action-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(66,185,131,0.25);
      transition: all 0.2s;
    }
    .action-btn:hover {
      background-color: var(--primary-hover);
    }
    .submit-btn {
      background-color: #2196f3;
      box-shadow: 0 4px 10px rgba(33, 150, 243, 0.25);
    }
    .submit-btn:hover {
      background-color: #1976d2;
    }
    .analysis-box {
      margin-top: 25px;
      padding-top: 25px;
      border-top: 2px dashed var(--border-color);
      line-height: 1.7;
    }
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
    }

    /* 移动端响应式样式 */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        padding: 10px 0 0 0;
        border-bottom: 1px solid #2d3748;
      }
      .sidebar-title {
        font-size: 16px;
        padding: 5px 16px 8px;
        border-bottom: none;
        text-align: center;
      }
      .menu-list {
        display: flex;
        overflow-x: auto;
        white-space: nowrap;
        margin-top: 0;
        padding: 0 10px;
        -webkit-overflow-scrolling: touch;
      }
      .menu-list::-webkit-scrollbar {
        display: none;
      }
      .menu-item {
        padding: 10px 16px;
        font-size: 13px;
        display: inline-block;
        border-left: none;
        border-bottom: 3px solid transparent;
        flex-shrink: 0;
      }
      .menu-item:hover, .menu-item.active {
        background-color: transparent;
      }
      .menu-item.active {
        border-bottom-color: var(--primary-color);
        color: #fff;
      }
      .main-content {
        padding: 15px;
      }
      .card {
        padding: 20px 15px;
        border-radius: 12px;
      }
      .title {
        font-size: 16px;
      }
      .options-grid {
        gap: 10px;
        margin: 20px 0;
      }
      .option-btn {
        padding: 12px 0;
        font-size: 18px;
        border-radius: 8px;
      }
    }
  </style>
  
  <script src="questions.js" defer></script>
  
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
  </script>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-title">⚡ 电气错题本</div>
    <ul class="menu-list">
      <li class="menu-item active" onclick="switchCategory('circuit', this)">电路 (Circuit)</li>
      <li class="menu-item" onclick="switchCategory('power-system', this)">电力系统分析 (Power System)</li>
      <li class="menu-item" onclick="switchCategory('machines', this)">电机学 (Machines)</li>
      <li class="menu-item" onclick="switchCategory('power-electronics', this)">电力电子 (Power Electronics)</li>
      <li class="menu-item" onclick="switchCategory('high-voltage', this)">高电压技术 (High Voltage)</li>
      <li class="menu-item" onclick="switchCategory('protection', this)">继电保护 (Protection)</li>
      <li class="menu-item" onclick="switchCategory('equipment', this)">电气设备 (Equipment)</li>
      <li class="menu-item" onclick="switchCategory('general-aptitude', this)">一般能力 (General Aptitude)</li>
    </ul>
  </div>

  <div class="main-content">
    <div class="quiz-container">
      <div class="progress-wrapper">
        <div class="progress-bar-bg">
          <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
        <div id="progress-txt" class="progress-text">进度：0% (0/0)</div>
      </div>
      <div id="quiz-card" class="card"></div>
    </div>
  </div>

  <script>
    // ⚡ 强力纠偏：直接死死锁住你当前真正的 review_Powergrid 仓库！
    const userName = "suzie0121511-hate";
    const repoName = "review_Powergrid"; 
    const cdnBase = `https://cdn.jsdelivr.net/gh/${userName}/${repoName}@main/`;

    let activeQuestions = [];
    let currentIdx = 0;
    let selectedOptions = [];

    document.addEventListener("DOMContentLoaded", function() {
      if (typeof quizData === "undefined") {
        setTimeout(initApp, 500);
      } else {
        initApp();
      }
    });

    function initApp() {
      loadCategory('circuit');
    }

    function switchCategory(catKey, menuEl) {
      document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
      menuEl.classList.add('active');
      loadCategory(catKey);
    }

    function loadCategory(catKey) {
      if (typeof quizData === "undefined") {
        showEmptyState();
        return;
      }
      
      const rawData = quizData[catKey] || [];
      if (rawData.length === 0) {
        showEmptyState();
        return;
      }
      
      activeQuestions = JSON.parse(JSON.stringify(rawData));
      
      for (let i = activeQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [activeQuestions[i], activeQuestions[j]] = [activeQuestions[j], activeQuestions[i]];
      }

      currentIdx = 0;
      renderQuestion();
    }

    function renderQuestion() {
      const card = document.getElementById('quiz-card');
      const q = activeQuestions[currentIdx];
      
      selectedOptions = [];

      // ⚡ URL 安全转码：对每一部分路径、中文名、空格进行完全转码，100%防死锁、防404
     // 替换为这套：不用 CDN，直接用相对路径智能秒开！
      let imgHtml = "";
      if (q.image && q.image.trim() !== "") {
        // 使用相对路径加载同仓库下的图片，既安全又秒开
        const relativeUrl = q.image.split('/').map(part => encodeURIComponent(part)).join('/');
        imgHtml = `<img src="${relativeUrl}" alt="题目插图">`;
      }

      const isMulti = q.type === "多选";
      const tagClass = isMulti ? "tag multi" : "tag";
      const tagText = isMulti ? "多选题" : "单选题";

      card.innerHTML = `
        <div class="card-header">
          <span class="${tagClass}">${tagText}</span>
          <span style="font-size: 13px; font-weight: bold; color: var(--text-muted)">第 ${currentIdx + 1} / ${activeQuestions.length} 题</span>
        </div>
        <div class="title">${q.title}</div>
        ${imgHtml}
        <div class="options-grid">
          <button class="option-btn" data-letter="A" onclick="handleOptionClick(this)">A</button>
          <button class="option-btn" data-letter="B" onclick="handleOptionClick(this)">B</button>
          <button class="option-btn" data-letter="C" onclick="handleOptionClick(this)">C</button>
          <button class="option-btn" data-letter="D" onclick="handleOptionClick(this)">D</button>
        </div>
        <div class="footer-zone">
          <div id="feedback-txt" class="feedback"></div>
          <button id="submit-btn" class="action-btn submit-btn" style="display: ${isMulti ? 'block' : 'none'};" onclick="submitMultiAnswer()">确认提交</button>
          <button id="next-btn" class="action-btn" style="display: none;" onclick="goNext()">下一题 ➔</button>
        </div>
        <div id="analysis-section" class="analysis-box" style="display: none;">
          <strong style="color: #2b6cb0;">✨ 标准答案：${q.answer}</strong><br><br>
          ${q.analysis}
        </div>
      `;
      
      updateProgress();
      
      if (window.MathJax && window.MathJax.typeset) {
        window.MathJax.typeset();
      }
    }

    function handleOptionClick(btn) {
      const q = activeQuestions[currentIdx];
      const letter = btn.getAttribute('data-letter');
      const allButtons = document.querySelectorAll('.option-btn');

      let hasStatus = false;
      allButtons.forEach(b => {
        if (b.classList.contains('wrong') || b.classList.contains('correct')) {
          hasStatus = true;
        }
      });
      if (hasStatus) {
        allButtons.forEach(b => {
          const bLetter = b.getAttribute('data-letter');
          b.className = 'option-btn';
          if (selectedOptions.includes(bLetter)) {
            b.classList.add('selected');
          }
        });
        document.getElementById('feedback-txt').innerHTML = '';
      }

      if (q.type === "多选") {
        if (selectedOptions.includes(letter)) {
          selectedOptions = selectedOptions.filter(l => l !== letter);
          btn.classList.remove('selected');
        } else {
          selectedOptions.push(letter);
          btn.classList.add('selected');
        }
      } else {
        checkSingleAnswer(btn, q.answer);
      }
    }

    function checkSingleAnswer(btn, correctAns) {
      const feedback = document.getElementById('feedback-txt');
      const nextBtn = document.getElementById('next-btn');
      const analysisSection = document.getElementById('analysis-section');
      const allButtons = document.querySelectorAll('.option-btn');
      
      const selected = btn.getAttribute('data-letter');
      allButtons.forEach(b => b.className = 'option-btn');

      if (selected === correctAns) {
        btn.classList.add('correct');
        feedback.innerHTML = '🎉 回答正确！已解锁解析。';
        feedback.className = 'feedback correct';
        analysisSection.style.display = 'block';
        nextBtn.style.display = 'block';
      } else {
        btn.classList.add('wrong');
        feedback.innerHTML = '❌ 答案错误，再换一个选项试试！';
        feedback.className = 'feedback wrong';
      }

      if (window.MathJax && window.MathJax.typeset) {
        window.MathJax.typeset();
      }
    }

    function submitMultiAnswer() {
      const q = activeQuestions[currentIdx];
      const feedback = document.getElementById('feedback-txt');
      const nextBtn = document.getElementById('next-btn');
      const submitBtn = document.getElementById('submit-btn');
      const analysisSection = document.getElementById('analysis-section');
      const allButtons = document.querySelectorAll('.option-btn');

      if (selectedOptions.length === 0) {
        feedback.innerHTML = '⚠️ 请先选择至少一个选项再提交！';
        feedback.className = 'feedback wrong';
        return;
      }

      const userAnsString = selectedOptions.sort().join('');
      const correctAnsString = q.answer.split('').sort().join('');

      if (userAnsString === correctAnsString) {
        allButtons.forEach(b => {
          const letter = b.getAttribute('data-letter');
          if (correctAnsString.includes(letter)) {
            b.className = 'option-btn correct';
          } else {
            b.className = 'option-btn';
          }
        });
        feedback.innerHTML = '🎉 回答正确！已解锁解析。';
        feedback.className = 'feedback correct';
        analysisSection.style.display = 'block';
        nextBtn.style.display = 'block';
        if (submitBtn) submitBtn.style.display = 'none';
      } else {
        allButtons.forEach(b => {
          const letter = b.getAttribute('data-letter');
          if (selectedOptions.includes(letter)) {
            b.className = 'option-btn wrong';
          } else {
            b.className = 'option-btn';
          }
        });
        feedback.innerHTML = '❌ 答案不完全正确或包含错误选项，再试试！';
        feedback.className = 'feedback wrong';
      }

      if (window.MathJax && window.MathJax.typeset) {
        window.MathJax.typeset();
      }
    }

    function goNext() {
      currentIdx++;
      if (currentIdx < activeQuestions.length) {
        renderQuestion();
      } else {
        document.getElementById('progress-fill').style.width = '100%';
        document.getElementById('progress-txt').innerText = `进度：100% (${activeQuestions.length}/${activeQuestions.length})`;
        document.getElementById('quiz-card').innerHTML = `
          <div style="text-align: center; padding: 40px 0;">
            <h2 style="color: var(--primary-color); margin-bottom: 15px;">🎉 完美通关！</h2>
            <p style="color: var(--text-muted); font-size: 15px;">当前板块的所有错题已经全部攻克！</p>
            <button class="action-btn" style="margin-top: 25px;" onclick="location.reload()">重新打乱再练一次</button>
          </div>
        `;
      }
    }

    function updateProgress() {
      const fill = document.getElementById('progress-fill');
      const txt = document.getElementById('progress-txt');
      const percent = Math.round((currentIdx / activeQuestions.length) * 100);
      fill.style.width = `${percent}%`;
      txt.innerText = `当前进度：${percent}% (${currentIdx}/${activeQuestions.length} 题已完成)`;
    }

    function showEmptyState() {
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('progress-txt').innerText = `进度：0% (0/0)`;
      document.getElementById('quiz-card').innerHTML = `
        <div class="empty-state">
          <h3>📭 当前板块暂无错题</h3>
          <p style="margin-top: 10px; font-size: 14px;">你可以修改 <code>questions.js</code> 往里面塞入错题数据哦！</p>
        </div>
      `;
    }
  </script>
</body>
</html>
